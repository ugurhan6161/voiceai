;=============================================================================
; VoiceAI PJSIP Configuration
; - MicroSIP test kullanıcısı (testuser)
; - Netgsm SIP Trunk (hazır, aktif edilecek)
;=============================================================================

[global]
type = global
endpoint_identifier_order = ip,username

;-----------------------------------------------------------------------------
; UDP Transport (SIP Sinyalizasyon)
;-----------------------------------------------------------------------------
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
external_media_address = 31.57.77.166
external_signaling_address = 31.57.77.166
local_net = 172.16.0.0/12
local_net = 172.17.0.0/16
local_net = 172.18.0.0/16

;=============================================================================
; TEST KULLANICISI - MicroSIP ile test için
;=============================================================================

[testuser]
type = endpoint
context = default
disallow = all
allow = ulaw
allow = alaw
allow = opus
auth = testuser-auth
aors = testuser-aor
direct_media = no
ice_support = yes
force_rport = yes
rewrite_contact = yes
rtp_symmetric = yes

[testuser-auth]
type = auth
auth_type = userpass
username = testuser
password = test1234

[testuser-aor]
type = aor
max_contacts = 5
remove_existing = yes

;=============================================================================
; NETGSM SIP TRUNK - Hazır (Aktif edilecek)
; Kullanım: Aşağıdaki yorum satırlarını kaldır ve bilgileri doldur
;=============================================================================

