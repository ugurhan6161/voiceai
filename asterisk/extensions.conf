[general]
static=yes
writeprotect=no

[voiceai-kvkk]
exten => s,1,Answer()
exten => s,n,Playback(voiceai/kvkk_bilgi)
exten => s,n,WaitExten(5)
exten => 9,1,Playback(voiceai/kvkk_tam_metin)
exten => 9,n,Goto(voiceai-dil-secim,s,1)
exten => t,1,Goto(voiceai-dil-secim,s,1)
exten => i,1,Goto(voiceai-dil-secim,s,1)

[voiceai-dil-secim]
exten => s,1,Playback(voiceai/dil_secim)
exten => s,n,WaitExten(8)
exten => 1,1,Set(LANG=tr)
exten => 1,n,Goto(voiceai-stasis,s,1)
exten => 2,1,Set(LANG=en)
exten => 2,n,Goto(voiceai-stasis,s,1)
exten => 3,1,Set(LANG=ar)
exten => 3,n,Goto(voiceai-stasis,s,1)
exten => 4,1,Set(LANG=ru)
exten => 4,n,Goto(voiceai-stasis,s,1)
exten => t,1,Set(LANG=tr)
exten => t,n,Goto(voiceai-stasis,s,1)
exten => i,1,Set(LANG=tr)
exten => i,n,Goto(voiceai-stasis,s,1)

[voiceai-stasis]
exten => s,1,NoOp(Stasis: Firma=${FIRMA_ID} Template=${TEMPLATE_ID} Dil=${LANG})
exten => s,n,Stasis(voiceai,${FIRMA_ID},${TEMPLATE_ID},${LANG})
exten => s,n,Hangup()

[default]
; 100'ü arayınca doğrudan Stasis'e gir (test)
exten => 100,1,Answer()
exten => 100,n,Set(FIRMA_ID=1)
exten => 100,n,Set(TEMPLATE_ID=otel)
exten => 100,n,Set(LANG=tr)
exten => 100,n,Stasis(voiceai,1,otel,tr)
exten => 100,n,Hangup()

; Diğer numaralar normal akış
exten => _X.,1,NoOp(Gelen: ${CALLERID(num)})
exten => _X.,n,Set(FIRMA_ID=1)
exten => _X.,n,Set(TEMPLATE_ID=otel)
exten => _X.,n,Set(LANG=tr)
exten => _X.,n,Goto(voiceai-kvkk,s,1)
