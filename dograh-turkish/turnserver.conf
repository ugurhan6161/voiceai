# ─────────────────────────────────────────────────────────────
#  Dograh AI — CoTURN Server Yapılandırması
#  WebRTC NAT geçişi için (uzak sunucu dağıtımı)
# ─────────────────────────────────────────────────────────────

# Dinleme portu
listening-port=3478
tls-listening-port=5349

# Harici IP — setup.sh tarafından otomatik doldurulur.
# Manuel kurulumda VPS IP adresinizi yazın:
# external-ip=VPS_IP_ADRESINIZ

# Relay portları
min-port=49152
max-port=49200

# Kimlik doğrulama
use-auth-secret
static-auth-secret=dograh-turn-secret-change-me

# Realm
realm=dograh.local

# Loglama
log-file=/var/log/turnserver.log
verbose

# Güvenlik
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1
