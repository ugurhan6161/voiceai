# ─────────────────────────────────────────────────────────────
#  Dograh AI — Türkçe Sesli Asistan Platformu
#  Docker Compose — Tüm servisleri tek komutla başlat
#
#  Kullanım (yerel):
#    docker compose up --pull always
#
#  Kullanım (VPS uzak sunucu):
#    docker compose --profile remote up --pull always
#
#  Dashboard: http://localhost:3010
# ─────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL (Veritabanı + pgvector) ───────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: dograh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  # ── Redis (Cache + Kuyruk) ──────────────────────────────────
  redis:
    image: redis:7
    container_name: dograh-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - app-network

  # ── MinIO (Nesne Depolama — Ses Dosyaları) ─────────────────
  minio:
    image: minio/minio
    container_name: dograh-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    # Portlar localhost'a bağlı — güvenlik için.
    # Container'lar arası iletişim Docker ağı üzerinden (minio:9000) çalışır.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── Nginx (Reverse Proxy — Sadece Uzak Sunucu) ─────────────
  nginx:
    image: nginx:alpine
    container_name: dograh-nginx
    profiles: ["remote"]
    restart: unless-stopped
    depends_on:
      - ui
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - app-network

  # ── Dograh API (Backend — FastAPI) ──────────────────────────
  api:
    image: ${REGISTRY:-ghcr.io/dograh-hq}/dograh-api:latest
    container_name: dograh-api
    restart: unless-stopped
    volumes:
      - shared-tmp:/tmp
    environment:
      ENVIRONMENT: "${ENVIRONMENT:-local}"
      LOG_LEVEL: "INFO"

      # Backend URL (VPS için değiştirin)
      BACKEND_API_ENDPOINT: "${BACKEND_API_ENDPOINT:-http://localhost:8000}"

      # Veritabanı
      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres"

      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD:-redissecret}@redis:6379"

      # MinIO (Nesne Depolama)
      ENABLE_AWS_S3: "false"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "voice-audio"
      MINIO_SECURE: "false"

      # FastAPI
      FASTAPI_WORKERS: ${FASTAPI_WORKERS:-1}

      # Telemetri (isteğe bağlı)
      ENABLE_TRACING: "false"

      # TURN Server (uzak sunucu WebRTC için)
      TURN_HOST: "${TURN_HOST:-}"
      TURN_SECRET: "${TURN_SECRET:-}"

      # JWT Secret
      OSS_JWT_SECRET: "${OSS_JWT_SECRET:-ChangeMeInProduction}"

    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      cloudflared:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/v1/health'').read()"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network

  # ── Dograh UI (Frontend — Next.js) ─────────────────────────
  ui:
    image: ${REGISTRY:-ghcr.io/dograh-hq}/dograh-ui:latest
    container_name: dograh-ui
    restart: unless-stopped
    environment:
      BACKEND_URL: "${BACKEND_URL:-http://api:8000}"
      NODE_ENV: "oss"
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
      # PostHog telemetri: ENABLE_TELEMETRY=false olduğunda kullanılmaz.
      # Telemetriyi açarsanız kendi PostHog anahtarınızı kullanın.
      POSTHOG_KEY: "${POSTHOG_KEY:-}"
      POSTHOG_HOST: "${POSTHOG_HOST:-https://us.posthog.com}"
    ports:
      - "3010:3010"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3010 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  # ── Cloudflared (Tünel — Dış Erişim) ───────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: dograh-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://api:8000 --metrics 0.0.0.0:2000
    ports:
      - "2000:2000"
    networks:
      - app-network

  # ── CoTURN (TURN Server — Sadece Uzak Sunucu) ──────────────
  coturn:
    image: coturn/coturn:4.8.0
    container_name: dograh-coturn
    restart: unless-stopped
    profiles: ["remote"]
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    command:
      - -c
      - /etc/coturn/turnserver.conf
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  minio-data:
    driver: local
  shared-tmp:
    driver: local

networks:
  app-network:
    driver: bridge
