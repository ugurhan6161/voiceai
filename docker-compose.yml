version: '3.9'

# ─────────────────────────────────────────────────────────────
#  VoiceAI Platform — Docker Compose
#  Tüm servisleri başlatmak için: docker-compose up -d
#  Güncelleme için: git pull && docker-compose up -d --build
# ─────────────────────────────────────────────────────────────

networks:
  voiceai-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  chromadb_data:
  xtts_models:
  whisper_models:
  asterisk_data:

services:

  # ── NGINX (Reverse Proxy) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: voiceai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - voiceai-net

  # ── ASTERISK (Telefoni) ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: voiceai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - voiceai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REDIS (Cache + Kuyruk) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voiceai-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - voiceai-net

  # ── OLLAMA (LLM Sunucu) ────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: voiceai-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - voiceai-net
    deploy:
      resources:
        limits:
          memory: 8G

  # ── FASTER-WHISPER (STT) ───────────────────────────────────
  whisper:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile.whisper
    container_name: voiceai-whisper
    restart: unless-stopped
    volumes:
      - whisper_models:/models
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-turbo}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-tr}
    networks:
      - voiceai-net
    deploy:
      resources:
        limits:
          memory: 3G

  # ── XTTS-v2 (TTS) ─────────────────────────────────────────
  xtts:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile.xtts
    container_name:  voiceai-xtts
    restart: unless-stopped
    volumes:
      - xtts_models:/models
      - /var/lib/asterisk/sounds:/var/lib/asterisk/sounds
    environment:
      - XTTS_DEFAULT_VOICE=${XTTS_DEFAULT_VOICE:-tr_female_1}
    networks:
      - voiceai-net
    deploy:
      resources:
        limits:
          memory: 4G

  # ── AI ENGINE (Pipecat Orchestrator) ──────────────────────
  ai-engine:
    build: ./ai-engine
    container_name: voiceai-ai-engine
    extra_hosts:
      - "asterisk:172.17.0.1"
    restart: unless-stopped
    ports:
      - "9092:9092"  # AudioSocket port
    volumes:
      - /var/lib/asterisk/sounds:/var/lib/asterisk/sounds
    environment:
      - ASTERISK_HOST=172.17.0.1
      - ASTERISK_ARI_PORT=8088
      - ASTERISK_ARI_USER=${ASTERISK_ARI_USER:-voiceai}
      - ASTERISK_ARI_PASSWORD=${ASTERISK_ARI_PASSWORD:-Asterisk2026!}
      - WHISPER_URL=http://whisper:9000
      - OLLAMA_URL=http://ollama:11434
      - XTTS_URL=http://xtts:5002
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
      whisper:
        condition: service_started
      xtts:
        condition: service_started
    networks:
      - voiceai-net

  # ── BACKEND (FastAPI) ──────────────────────────────────────
  backend:
    build: ./backend
    container_name: voiceai-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voiceai-net

  # ── CELERY WORKER (Arka Plan Görevleri) ───────────────────
  celery-worker:
    build: ./backend
    container_name: voiceai-celery
    restart: unless-stopped
    command: celery -A celery_app.celery worker --loglevel=info -Q default,sms,billing
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - NETGSM_SMS_USERNAME=${NETGSM_SMS_USERNAME}
      - NETGSM_SMS_PASSWORD=${NETGSM_SMS_PASSWORD}
    depends_on:
      - redis
      - postgres
    networks:
      - voiceai-net

  # ── CELERY BEAT (Cron Zamanlayıcı) ────────────────────────
  celery-beat:
    build: ./backend
    container_name: voiceai-celery-beat
    restart: unless-stopped
    command: celery -A celery_app.celery beat --loglevel=info
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    depends_on:
      - redis
    networks:
      - voiceai-net

  # ── FRONTEND (Next.js) ─────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: voiceai-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://${APP_DOMAIN}/api
    depends_on:
      - backend
    networks:
      - voiceai-net

  # ── CHROMADB (Vektör DB — RAG) ────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: voiceai-chromadb
    restart: unless-stopped
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - voiceai-net

  # ── PROMETHEUS (Metrik Toplama) ────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: voiceai-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - voiceai-net

  # ── GRAFANA (İzleme Dashboard) ────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: voiceai-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    networks:
      - voiceai-net
